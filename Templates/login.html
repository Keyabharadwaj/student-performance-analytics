<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* DARK OVERLAY */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
            width: 300px;
            animation: fadeIn 0.6s ease;
        }

        .overlay img {
            margin-bottom: 15px;
        }

        .overlay h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

<div class="overlay">

    <!-- 🔹 LOGO -->
    <img src="{{ url_for('static', filename='images/logo.png') }}" width="50">

    <h2>Smart Analytics Login</h2>

    <!-- 🔹 LOGIN FORM -->
    <form action="/login" method="POST">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
